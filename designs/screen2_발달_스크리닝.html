<script>
    let currentStep = 1;
    const totalSteps = 3;
    const steps = [
        { id: 'step-1', title: '기본 정보' },
        { id: 'step-2', title: '언어 발달 체크포인트' },
        { id: 'step-3', title: '놀이 기질 및 성향' }
    ];

    const nextBtn = document.getElementById('next-btn');
    const prevBtn = document.getElementById('prev-btn');
    const submitBtn = document.getElementById('submit-btn');
    const progressBar = document.getElementById('progress-bar');
    const stepLabel = document.getElementById('step-label');
    const stepTitle = document.getElementById('step-title');

    function updateStep(direction) {
        // Hide current
        document.getElementById(`step-${currentStep}`).classList.add('hidden');
        
        // Update index
        currentStep += direction;
        
        // Show new
        document.getElementById(`step-${currentStep}`).classList.remove('hidden');
        
        // Update UI
        progressBar.style.width = `${(currentStep / totalSteps) * 100}%`;
        stepLabel.innerText = `${currentStep}단계 / ${totalSteps}단계`;
        stepTitle.innerText = steps[currentStep - 1].title;

        // Button visibility
        prevBtn.classList.toggle('hidden', currentStep === 1);
        
        if (currentStep === totalSteps) {
            nextBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
        } else {
            nextBtn.classList.remove('hidden');
            submitBtn.classList.add('hidden');
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    nextBtn.addEventListener('click', () => updateStep(1));
    prevBtn.addEventListener('click', () => updateStep(-1));

    document.getElementById('screening-form').addEventListener('submit', (e) => {
        e.preventDefault();
        // Result navigation simulation
        alert('분석 중입니다... 망미동 지역의 가장 잘 맞는 친구를 찾고 있습니다.');
        console.log('Form Submitted');
    });
</script>
